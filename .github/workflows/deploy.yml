name: CI/CD - Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build application
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f "dist/index.cjs" ]; then
            echo "Error: Build artifact dist/index.cjs not found"
            exit 1
          fi
          echo "Build successful - dist/index.cjs exists ($(du -h dist/index.cjs | cut -f1))"

      - name: Run security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  deploy:
    name: Deploy to Render
    needs: [build-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
    
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Error: RENDER_DEPLOY_HOOK_URL secret is not set."
            echo "Follow the setup steps in RENDER_DEPLOYMENT.md to add it."
            exit 1
          fi
          echo "Triggering Render deployment..."
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL" || {
            echo "Error: Failed to trigger Render deploy hook. Check that RENDER_DEPLOY_HOOK_URL is correct."
            exit 1
          }
          echo "Deploy triggered. Monitor progress at https://dashboard.render.com"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
