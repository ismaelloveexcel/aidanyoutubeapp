<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TubeStar - Creator Studio</title>
    <script>
      // Single Page App redirect handler for GitHub Pages.
      // Restores the original URL that was encoded by 404.html into the query string.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          // Remove the trailing slash added by the 404.html redirect before appending the decoded path
          var basePath = l.pathname.replace(/\/$/, "");
          window.history.replaceState(null, null, basePath + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
