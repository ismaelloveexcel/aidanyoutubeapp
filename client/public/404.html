<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TubeStar - Creator Studio</title>
    <script>
      // Single Page App redirect for GitHub Pages.
      // Redirects 404s back to index.html, encoding the original path in the
      // query string so the index.html script can restore it via history.replaceState.
      // pathSegmentsToKeep = 1 keeps the repository name segment (e.g. /aidanyoutubeapp/)
      // in the redirect URL so the base path is preserved for project pages.
      var pathSegmentsToKeep = 1;
      var location = window.location;
      var origin = location.protocol + "//" + location.hostname + (location.port ? ":" + location.port : "");
      var basePath = location.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/");
      var remainingPath = location.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~");
      var queryString = location.search ? "&" + location.search.slice(1).replace(/&/g, "~and~") : "";
      location.replace(origin + basePath + "/?/" + remainingPath + queryString + location.hash);
    </script>
  </head>
  <body></body>
</html>
